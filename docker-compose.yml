name: ${COMPOSE_PROJECT_NAME:-sistema-barbearia}

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
  working_dir: /var/www/html
  entrypoint: ["/usr/local/bin/project-entrypoint"]
  volumes:
    - ./:/var/www/html
    - composer-cache:/tmp/composer-cache
  environment: &app-environment
    APP_NAME: ${APP_NAME:-Sistema Barbearia}
    APP_ENV: ${APP_ENV:-local}
    APP_DEBUG: ${APP_DEBUG:-true}
    APP_URL: ${APP_URL:-http://sistema-barbearia.localhost}
    LOG_CHANNEL: ${LOG_CHANNEL:-stack}
    LOG_LEVEL: ${LOG_LEVEL:-debug}
    DB_CONNECTION: ${DB_CONNECTION:-mysql}
    DB_DEFAULT_CONNECTION: ${DB_DEFAULT_CONNECTION:-landlord}
    DB_HOST: ${DB_HOST:-mariadb}
    DB_PORT: ${DB_PORT:-3306}
    DB_DATABASE: ${DB_DATABASE:-sistema_barbearia}
    DB_USERNAME: ${DB_USERNAME:-sistema_barbearia}
    DB_PASSWORD: ${DB_PASSWORD:-secret}
    LANDLORD_DB_CONNECTION: ${LANDLORD_DB_CONNECTION:-mysql}
    LANDLORD_DB_HOST: ${LANDLORD_DB_HOST:-mariadb}
    LANDLORD_DB_PORT: ${LANDLORD_DB_PORT:-3306}
    LANDLORD_DB_DATABASE: ${LANDLORD_DB_DATABASE:-sistema_barbearia_landlord}
    LANDLORD_DB_USERNAME: ${LANDLORD_DB_USERNAME:-sistema_barbearia}
    LANDLORD_DB_PASSWORD: ${LANDLORD_DB_PASSWORD:-secret}
    TENANT_DB_CONNECTION: ${TENANT_DB_CONNECTION:-mysql}
    TENANT_DB_HOST: ${TENANT_DB_HOST:-mariadb}
    TENANT_DB_PORT: ${TENANT_DB_PORT:-3306}
    TENANT_DB_DATABASE: ${TENANT_DB_DATABASE:-tenant_placeholder}
    TENANT_DB_USERNAME: ${TENANT_DB_USERNAME:-sistema_barbearia}
    TENANT_DB_PASSWORD: ${TENANT_DB_PASSWORD:-secret}
    TENANT_DATABASE_PREFIX: ${TENANT_DATABASE_PREFIX:-sistema_barbearia_tenant_}
    TENANT_DATABASE_CHARSET: ${TENANT_DATABASE_CHARSET:-utf8mb4}
    TENANT_DATABASE_COLLATION: ${TENANT_DATABASE_COLLATION:-utf8mb4_unicode_ci}
    TENANT_DEFAULT_DOMAIN_SUFFIX: ${TENANT_DEFAULT_DOMAIN_SUFFIX:-sistemabarbearia.local}
    CENTRAL_DOMAINS: ${CENTRAL_DOMAINS:-sistemabarbearia.local,localhost,127.0.0.1}
    TENANT_SLUG_HEADER: ${TENANT_SLUG_HEADER:-X-Tenant-Slug}
    MAIL_MAILER: ${MAIL_MAILER:-smtp}
    MAIL_HOST: ${MAIL_HOST:-mailpit}
    MAIL_PORT: ${MAIL_PORT:-1025}
    MAIL_USERNAME: ${MAIL_USERNAME:-null}
    MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
    MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-null}
    QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
    CACHE_STORE: ${CACHE_STORE:-file}
    SESSION_DRIVER: ${SESSION_DRIVER:-file}
    STARTUP_TIMEOUT: ${STARTUP_TIMEOUT:-90}
    STARTUP_SLEEP: ${STARTUP_SLEEP:-2}
    WAIT_FOR_DATABASE: ${WAIT_FOR_DATABASE:-1}
    WAIT_FOR_MAILPIT: ${WAIT_FOR_MAILPIT:-0}
    COMPOSER_HOME: /tmp/composer-cache
    COMPOSER_CACHE_DIR: /tmp/composer-cache/cache
  networks:
    - app
    - shared

services:
  app:
    <<: *app-common
    command: ["php-fpm", "-F"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "SCRIPT_NAME=/fpm-ping SCRIPT_FILENAME=/fpm-ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:ro
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST:-sistema-barbearia.localhost}
      VIRTUAL_PORT: ${VIRTUAL_PORT:-80}
      VIRTUAL_PROTO: ${VIRTUAL_PROTO:-http}
    networks:
      app:
      shared:
        aliases:
          - sistema-barbearia
          - sistema-barbearia-web
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  queue:
    <<: *app-common
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--verbose",
        "--tries=3",
        "--timeout=90",
      ]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["workers"]

  scheduler:
    <<: *app-common
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["workers"]

  setup:
    <<: *app-common
    command: ["/usr/local/bin/install-laravel"]
    profiles: ["tools"]
    restart: "no"
    networks:
      - app
    environment:
      <<: *app-environment
      DB_CONNECTION: sqlite
      DB_DATABASE: /tmp/laravel-setup.sqlite
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      WAIT_FOR_DATABASE: "0"
      WAIT_FOR_MAILPIT: "0"

  test:
    <<: *app-common
    command: ["php", "artisan", "test"]
    profiles: ["tools"]
    restart: "no"
    networks:
      - app
    environment:
      <<: *app-environment
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database_test.sqlite
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      WAIT_FOR_DATABASE: "0"
      WAIT_FOR_MAILPIT: "0"

volumes:
  composer-cache:

networks:
  app:
    driver: bridge
  shared:
    external: true
    name: ${DOCKER_SHARED_NETWORK}
